services:
  # ── Redis — shared cache ──
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: [ "CMD", "redis-cli", "ping" ]
      interval: 5s
      timeout: 3s
      retries: 3

  # ── PostgreSQL — persistent financial data ──
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: rag
      POSTGRES_PASSWORD: rag
      POSTGRES_DB: investdb
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./schema.sql:/docker-entrypoint-initdb.d/01_schema.sql:ro
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U rag -d investdb" ]
      interval: 5s
      timeout: 3s
      retries: 5

  # ── FastAPI Server (scaled with --scale api=N) ──
  api:
    build: .
    env_file: .env
    environment:
      - REDIS_HOST=redis
      - DATABASE_URL=postgresql://rag:rag@postgres:5432/investdb
    depends_on:
      redis:
        condition: service_healthy
      postgres:
        condition: service_healthy

  # ── Nginx Load Balancer ──
  nginx:
    image: nginx:alpine
    ports:
      - "8000:80"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - api

volumes:
  pgdata:
