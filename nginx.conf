events {
    worker_connections 1024;
}

http {
    # ── Docker embedded DNS (resolves service names → container IPs) ──
    resolver 127.0.0.11 valid=10s ipv6=off;

    # ── Rate Limiting Zones ──
    limit_req_zone $binary_remote_addr zone=chat_limit:10m rate=10r/s;
    limit_req_zone $binary_remote_addr zone=general_limit:10m rate=30r/s;

    # Return 429 (Too Many Requests) instead of default 503
    limit_req_status 429;

    server {
        listen 80;

        # ── Health & Metrics (generous limit) ──
        location /health {
            set $backend api;
            proxy_pass http://$backend:8000;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            limit_req zone=general_limit burst=10 nodelay;
        }

        location /metrics {
            set $backend api;
            proxy_pass http://$backend:8000;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            limit_req zone=general_limit burst=10 nodelay;
        }

        # ── SSE Streaming — disable buffering + rate limit ──
        location /chat/stream {
            set $backend api;
            proxy_pass http://$backend:8000;

            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;

            # Critical for SSE: tokens must flow immediately
            proxy_buffering off;
            proxy_cache off;
            proxy_read_timeout 60s;

            # SSE headers
            proxy_set_header Connection '';
            proxy_http_version 1.1;
            chunked_transfer_encoding off;

            # Rate limit: 10 req/s per IP, burst of 5
            limit_req zone=chat_limit burst=5 nodelay;
        }

        # ── Regular API endpoints (including /chat) ──
        location / {
            set $backend api;
            proxy_pass http://$backend:8000;

            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;

            proxy_connect_timeout 10s;
            proxy_read_timeout 60s;

            # Rate limit: 10 req/s per IP, burst of 5
            limit_req zone=chat_limit burst=5 nodelay;
        }
    }
}
