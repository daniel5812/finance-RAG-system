services:
  # ── Redis — shared cache ──
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: [ "CMD", "redis-cli", "ping" ]
      interval: 5s
      timeout: 3s
      retries: 3

  # ── PostgreSQL — persistent financial data ──
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: rag
      POSTGRES_PASSWORD: rag
      POSTGRES_DB: investdb
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./schema.sql:/docker-entrypoint-initdb.d/01_schema.sql:ro
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U rag -d investdb" ]
      interval: 5s
      timeout: 3s
      retries: 5

  # ── FastAPI Server (scaled with --scale api=N) ──
  api:
    build: .
    env_file: .env
    dns:
      - 8.8.8.8
      - 8.8.4.4
    environment:
      - REDIS_HOST=redis
      - DATABASE_URL=postgresql://rag:rag@postgres:5432/investdb
      - DOCUMENT_UPLOAD_DIR=/app/uploads
    depends_on:
      redis:
        condition: service_healthy
      postgres:
        condition: service_healthy
    volumes:
      - .:/app
      - uploads:/app/uploads
    healthcheck:
      test: [ "CMD-SHELL", "python -c 'import urllib.request; urllib.request.urlopen(\"http://localhost:8000/health\")'" ]
      interval: 300s
      timeout: 5s
      retries: 3
      start_period: 120s

  # ── Indexing Worker (Standalone) ──
  worker:
    build: .
    command: python /app/worker_entrypoint.py
    env_file: .env
    dns:
      - 8.8.8.8
      - 8.8.4.4
    environment:
      - REDIS_HOST=redis
      - DATABASE_URL=postgresql://rag:rag@postgres:5432/investdb
      - DOCUMENT_UPLOAD_DIR=/app/uploads
    depends_on:
      redis:
        condition: service_healthy
      postgres:
        condition: service_healthy
    volumes:
      - uploads:/app/uploads

  # ── Nginx Load Balancer ──
  nginx:
    image: nginx:alpine
    ports:
      - "8000:80"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      api:
        condition: service_healthy

volumes:
  pgdata:
  uploads:
